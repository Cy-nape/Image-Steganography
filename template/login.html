<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Steganography App</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <h1><i class="fas fa-shield-alt"></i> Auth</h1>
        <div class="card">
            <h2><i class="fas fa-user"></i> Login / Register</h2>
            <div id="auth-status" style="margin-bottom: 15px; font-weight: bold;"></div>
            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required style="width: 100%; padding: 8px;">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" required style="width: 100%; padding: 8px;">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" id="btn-login" class="btn-primary" style="flex: 1;">Login</button>
                    <button type="button" id="btn-register" class="btn-secondary" style="flex: 1;">Register</button>
                </div>
            </form>
        </div>
    </div>
    <script src="/static/login.js"></script>
</body>
</html>
